version: "3.9"

services:
  bili-monitor:
    build: .
    container_name: bili-monitor
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - .env                     # 本地 .env 变量注入
    volumes:
      - ./bili_monitor.log:/app/bili_monitor.log:rw
      - ./bili_monitor.db:/app/bili_monitor.db:rw
      - ./bili_cookie.txt:/app/bili_cookie.txt:rw   # 永久 Cookie
      - ./webhook_config.txt:/app/webhook_config.txt:ro
